<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkVault</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <div>
        <h1>LinkVault</h1>
        <p id="connection-state" class="muted">Checking settings...</p>
      </div>
      <button id="open-options" type="button">Options</button>
    </header>

    <section class="panel">
      <h2>Save current tab</h2>
      <label>Tags
        <input id="save-tags" placeholder="browser, reading" value="browser">
      </label>
      <label>Collections
        <input id="save-collections" placeholder="Inbox" value="Inbox">
      </label>
      <label>Notes
        <textarea id="save-notes" rows="2" placeholder="Optional"></textarea>
      </label>
      <div class="checks">
        <label><input id="save-favorite" type="checkbox"> Favorite</label>
        <label><input id="save-pinned" type="checkbox"> Pin</label>
      </div>
      <button id="save-current-tab" class="primary" type="button">Save tab</button>
    </section>

    <section class="panel">
      <h2>Browser bookmarks</h2>
      <p class="muted">Choose all browser bookmarks or one folder before sending them to LinkVault's import preview.</p>
      <label>Import source
        <select id="bookmark-source">
          <option value="">All browser bookmarks</option>
        </select>
      </label>
      <details class="filter-panel">
        <summary>Filters</summary>
        <label>Search title, URL, folder
          <input id="bookmark-filter-query" placeholder="github, homelab, docs">
        </label>
        <label>Address or domain
          <input id="bookmark-filter-domain" placeholder="github.com">
        </label>
        <div class="field-grid">
          <label>Added from
            <input id="bookmark-filter-added-from" type="date">
          </label>
          <label>Added until
            <input id="bookmark-filter-added-to" type="date">
          </label>
        </div>
        <button id="clear-bookmark-filters" type="button">Clear filters</button>
      </details>
      <div class="actions">
        <button id="refresh-bookmark-sources" type="button">Refresh folders</button>
        <button id="preview-bookmarks" type="button">Preview import</button>
        <button id="import-bookmarks" type="button">Import</button>
      </div>
    </section>

    <section class="panel">
      <h2>Import into browser</h2>
      <p class="muted">Create a new browser folder from LinkVault. Existing browser bookmarks are not changed or deleted.</p>
      <button id="import-into-browser" type="button">Create LinkVault Import folder</button>
    </section>

    <section id="result" class="status" role="status"></section>
    <section id="preview-details" class="preview-details" hidden></section>
  </main>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
